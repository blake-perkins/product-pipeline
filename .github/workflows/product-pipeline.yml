name: Product Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fetch-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fetch & Unpack Cameo Model
        run: ./gradlew unpackCameoZip --no-daemon
        continue-on-error: true

      # For prototype: use sample data if Nexus is unavailable
      - name: Use sample data (prototype fallback)
        if: failure()
        run: |
          mkdir -p build/cameo/requirements build/cameo/proto
          cp -r ../cameo-model-pipeline/tests/fixtures/sample_requirements_export.json \
            build/cameo/requirements/requirements.json 2>/dev/null || \
          echo '{"exportMetadata":{"exportTimestamp":"2026-03-10T14:30:00Z","cameoVersion":"2024x","projectName":"Sample","modelVersion":"0.1.0"},"requirements":[]}' \
            > build/cameo/requirements/requirements.json

      - uses: actions/upload-artifact@v4
        with:
          name: cameo-model
          path: build/cameo/

  traceability-check:
    needs: fetch-model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cameo-model
          path: build/cameo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install -r tools/requirements.txt

      - name: Run Traceability Check
        run: |
          python tools/traceability_checker.py \
            --requirements build/cameo/requirements/requirements.json \
            --features-dir bdd/features \
            --stubs-output-dir bdd/features/automated \
            --non-test-output-dir bdd/features/non_test \
            --report-output build/reports/traceability/traceability_report.json \
            --html-report-output build/reports/traceability/traceability_report.html \
            --fail-on-uncovered \
            --fail-on-orphaned

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: traceability-report
          path: build/reports/traceability/

  bdd-tests:
    needs: traceability-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cameo-model
          path: build/cameo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install BDD dependencies
        run: pip install -r bdd/requirements.txt

      # For prototype without K8s: use pre-recorded sample logs
      - name: Create sample logs (prototype)
        run: |
          mkdir -p build/logs/product build/logs/simulator
          cat > build/logs/product/container-a.log << 'LOGS'
          {"timestamp":"2026-03-10T14:30:00.100Z","level":"INFO","component":"main","message":"System started"}
          {"timestamp":"2026-03-10T14:30:01.000Z","level":"INFO","component":"icd-handler","message":"Received IcdRequest: test-001","request_id":"test-001"}
          {"timestamp":"2026-03-10T14:30:01.150Z","level":"INFO","component":"icd-handler","message":"Sent IcdResponse: status=OK","request_id":"test-001","status":"OK"}
          {"timestamp":"2026-03-10T14:30:02.000Z","level":"INFO","component":"health","message":"HealthStatus emitted"}
          {"timestamp":"2026-03-10T14:30:05.000Z","level":"WARN","component":"icd-handler","message":"Malformed message rejected","reason":"invalid protobuf"}
          LOGS
          cat > build/logs/simulator/simulator.log << 'LOGS'
          {"timestamp":"2026-03-10T14:30:00.900Z","level":"INFO","message":"Simulator started"}
          {"timestamp":"2026-03-10T14:30:01.200Z","level":"INFO","message":"IcdResponse received with status OK","request_id":"test-001"}
          {"timestamp":"2026-03-10T14:30:10.000Z","level":"INFO","message":"SCENARIO_COMPLETE"}
          LOGS
          cat > build/logs/metadata.json << 'META'
          {"simulation_timestamp":"2026-03-10T14:30:00Z","namespace":"test","topology":"pod","product_restart_count":0,"product_final_status":"Running"}
          META

      - name: Run BDD Log Analysis
        env:
          LOG_DIR: build/logs
        run: |
          cd bdd
          python -m behave \
            --format json \
            --outfile ../build/reports/bdd/behave-results.json \
            --format pretty \
            --no-capture \
            features/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/reports/

  traceability-report:
    needs: bdd-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cameo-model
          path: build/cameo
      - uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: build/reports
      - uses: actions/download-artifact@v4
        with:
          name: traceability-report
          path: build/reports/traceability

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install -r tools/requirements.txt

      - name: Generate Final Traceability Report
        run: |
          python tools/report_generator.py \
            --requirements build/cameo/requirements/requirements.json \
            --behave-results build/reports/bdd/behave-results.json \
            --traceability-input build/reports/traceability/traceability_report.json \
            --output-json build/reports/traceability/final_traceability_report.json \
            --output-html build/reports/traceability/traceability_report.html

      - uses: actions/upload-artifact@v4
        with:
          name: final-traceability-report
          path: build/reports/traceability/
