# Production environment overrides
replicaCount: 2

images:
  containerA:
    repository: registry.internal.example.com/product/container-a
    tag: "2.1.0"
    port: 50051
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  containerB:
    repository: registry.internal.example.com/product/container-b
    tag: "2.1.0"
    port: 50052
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  sidecar:
    repository: registry.internal.example.com/product/sidecar
    tag: "1.0.3"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

imagePullSecret: registry-credentials

service:
  type: ClusterIP
  port: 8080
