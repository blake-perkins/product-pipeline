replicaCount: 1

images:
  containerA:
    repository: registry.internal.example.com/product/container-a
    tag: "0.1.0"
    port: 50051
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  containerB:
    repository: registry.internal.example.com/product/container-b
    tag: "0.1.0"
    port: 50052
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  sidecar:
    repository: registry.internal.example.com/product/sidecar
    tag: "0.1.0"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

imagePullSecret: registry-credentials

service:
  type: ClusterIP
  port: 8080
