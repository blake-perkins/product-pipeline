# Cameo model artifact (bump this to pull in new model version)
cameo.group=com.org.systems
cameo.artifact=cameo-model-artifacts
cameo.version=0.1.0

# Deployment topology: "single" or "pod"
# - single: deploys one container image for testing
# - pod: deploys the full multi-container pod
deploy.topology=pod

# Product container images (used when deploy.topology=pod)
container.a.image=product/container-a
container.a.version=0.1.0
container.b.image=product/container-b
container.b.version=0.1.0
sidecar.image=product/sidecar
sidecar.version=0.1.0

# Single container image (used when deploy.topology=single)
single.container.image=product/container-a
single.container.version=0.1.0

# Helm chart version
helm.chart.version=0.1.0
